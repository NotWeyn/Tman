<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Screen Translator Remote</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-purple: #a78bfa;
            --accent-blue: #3b82f6;
            --theme-gradient-start: #2e1065;
            --theme-gradient-end: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glass-blur: blur(20px);
            --sidebar-width: 280px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            background: radial-gradient(circle at top left, var(--theme-gradient-start), var(--theme-gradient-end));
            background-attachment: fixed;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 100;
            position: absolute;
            left: calc(-1 * var(--sidebar-width));
        }

        #sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.2rem;
            background: linear-gradient(to right, #fff, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-list {
            list-style: none;
            padding: 1rem;
            margin: 0;
            flex: 1;
        }

        .nav-item {
            padding: 1rem 1.5rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: var(--transition);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-item:hover {
            background: var(--glass-bg);
            color: #fff;
        }

        .nav-item.active {
            background: rgba(167, 139, 250, 0.15);
            color: var(--accent-purple);
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        /* --- Main Content --- */
        #content-wrapper {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            width: 100%;
        }

        header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            z-index: 50;
        }

        .menu-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.6rem;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .view-title {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--glass-border);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .dot.online { background: #10b981; box-shadow: 0 0 10px #10b981; }

        main {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            position: relative;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.3s ease-out;
            max-width: 1000px;
            margin: 0 auto;
        }

        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Cards & Panels --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-purple);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .translation-text {
            font-size: 1.75rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 1.5rem;
        }

        .original-text {
            font-size: 1.1rem;
            opacity: 0.7;
            border-left: 3px solid var(--glass-border);
            padding-left: 1rem;
            margin-bottom: 2rem;
        }

        /* --- Image Comparison Grid --- */
        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .image-box img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            object-fit: contain;
            max-height: 300px;
        }

        .image-label {
            font-size: 0.7rem;
            text-align: center;
            opacity: 0.5;
        }

        /* --- History List --- */
        .history-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        .history-card:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: scale(1.01);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .history-lang {
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            opacity: 0.4;
        }

        /* Overlay for sidebar */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        #overlay.active { display: block; }

        @media (max-width: 600px) {
            .image-comparison { grid-template-columns: 1fr; }
            .translation-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Tman Remote</h2>
        </div>
        <ul class="nav-list">
            <li class="nav-item active" onclick="switchView('translator', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6 6-6"/></svg>
                Screen Translator
            </li>
            <li class="nav-item" onclick="switchView('history', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                History
            </li>
        </ul>
        <div style="padding: 1.5rem; font-size: 0.7rem; opacity: 0.3; text-align: center;">
            v1.0.0 Dev Tools Active
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="content-wrapper">
        <header>
            <button class="menu-btn" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="view-title" id="current-view-title">Screen Translator</div>
            <div class="status-badge">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">Offline</span>
            </div>
        </header>

        <main>
            <!-- Screen Translator View -->
            <div id="view-translator" class="view-section active">
                <div id="latest-content">
                    <!-- Initial State -->
                    <div class="empty-state" id="translator-empty">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📸</div>
                        Waiting for a capture...
                    </div>
                    
                    <!-- Content Card (hidden initially) -->
                    <div id="main-card" class="glass-panel" style="display: none;">
                        <div class="label">Translation (<span id="target-lang-label"></span>)</div>
                        <div class="translation-text" id="main-translated"></div>
                        
                        <div class="label">Original (<span id="source-lang-label"></span>)</div>
                        <div class="original-text" id="main-original"></div>

                        <div class="label">Dev Debug: Image Comparison</div>
                        <div class="image-comparison">
                            <div class="image-box">
                                <img id="img-captured" src="" alt="Captured">
                                <div class="image-label">Raw Capture</div>
                            </div>
                            <div class="image-box">
                                <img id="img-processed" src="" alt="Processed">
                                <div class="image-label">Pre-processed (OCR Input)</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History View -->
            <div id="view-history" class="view-section">
                <div id="history-list">
                    <div class="empty-state">No history recorded yet.</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const viewTitle = document.getElementById('current-view-title');
        
        let historyData = [];

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function switchView(viewId, el) {
            // Update UI
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            viewTitle.innerText = el.innerText.trim();
            
            if (window.innerWidth < 800) toggleSidebar();
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            const wsUrl = `${protocol}//${host}/ws`;
            
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusDot.classList.add('online');
                statusText.innerText = 'Online';
            };

            ws.onclose = () => {
                statusDot.classList.remove('online');
                statusText.innerText = 'Offline';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleNewTranslation(data);
                } catch (e) { console.error(e); }
            };
        }

        function handleNewTranslation(data) {
            // Update Main Card
            document.getElementById('translator-empty').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';
            
            document.getElementById('main-translated').innerText = data.translated_text;
            document.getElementById('main-original').innerText = data.original_text;
            document.getElementById('target-lang-label').innerText = data.target_lang;
            document.getElementById('source-lang-label').innerText = data.source_lang;
            
            if (data.captured_image) document.getElementById('img-captured').src = data.captured_image;
            if (data.processed_image) document.getElementById('img-processed').src = data.processed_image;

            // Add to History
            historyData.unshift({
                ...data,
                timestamp: new Date().toLocaleTimeString()
            });
            if (historyData.length > 50) historyData.pop();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if (historyData.length === 0) return;

            container.innerHTML = historyData.map((item, index) => `
                <div class="history-card">
                    <div class="history-header">
                        <div class="history-lang">${item.source_lang} → ${item.target_lang}</div>
                        <div class="history-lang">${item.timestamp}</div>
                    </div>
                    <div style="font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem;">${item.translated_text}</div>
                    <div style="font-size: 0.9rem; opacity: 0.6; margin-bottom: 1rem;">${item.original_text}</div>
                    
                    <div class="image-comparison" style="margin-top: 1rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                        <div class="image-box">
                            <img src="${item.captured_image || ''}" style="max-height: 150px;">
                        </div>
                        <div class="image-box">
                            <img src="${item.processed_image || ''}" style="max-height: 150px;">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        connect();
    </script>
</body>
</html>
