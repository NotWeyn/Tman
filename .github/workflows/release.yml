name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Linux system dependencies & Fast Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libleptonica-dev \
            libtesseract-dev \
            clang \
            lld

      - name: Install Node dependencies
        run: npm ci

      - name: Build production binary (No Bundle)
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: npm run tauri build -- --no-bundle

      - name: Create tar.gz archive
        run: |
          tar -czf tman-linux-x86_64.tar.gz -C src-tauri/target/release tman

      - name: Sign tar.gz archive
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri signer sign tman-linux-x86_64.tar.gz

      - name: Generate latest.json for Tauri Auto-Updater
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 -c "
          import os, json, sys
          from datetime import datetime
          tag_name = os.environ.get('TAG_NAME', '')
          # Strip leading 'v' to get raw SemVer for Tauri client
          version_semver = tag_name.lstrip('v')
          
          sig_path = 'tman-linux-x86_64.tar.gz.sig'
          if not os.path.exists(sig_path):
              print('❌ Error: Signature file not found!')
              sys.exit(1)
              
          with open(sig_path, 'r') as f:
              signature = f.read().strip()
              
          latest_json = {
              'version': version_semver,
              'notes': f'Tman {tag_name} sürümü yayınlandı.',
              'pub_date': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': {
                  'linux-x86_64': {
                      'signature': signature,
                      'url': f'https://github.com/NotWeyn/Tman/releases/download/{tag_name}/tman-linux-x86_64.tar.gz'
                  }
              }
          }
          
          with open('latest.json', 'w') as f:
              json.dump(latest_json, f, indent=2)
              
          print('✅ Generated latest.json successfully!')
          "

      - name: Create GitHub Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tman ${{ github.ref_name }}" \
            --notes "Tman ${{ github.ref_name }} sürümü yayınlandı. Bu sürüm doğrudan start.sh kullanan kullanıcılar için optimize edilmiştir." \
            --draft=false \
            --prerelease=false \
            tman-linux-x86_64.tar.gz \
            latest.json

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            tman-linux-x86_64.tar.gz
            latest.json
          if-no-files-found: warn
