name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync version and commit to main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Syncing version to $VERSION"
          
          git checkout main
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          sed -i 's/"version": ".*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json
          sed -i '0,/"version": ".*"/{s/"version": ".*"/"version": "'"$VERSION"'"/}' package.json
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml src-tauri/tauri.conf.json package.json
          git commit -m "chore: bump version to $VERSION" || echo "No changes to commit"
          git push origin main

      - name: Generate latest.json for Tauri Auto-Updater
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 -c "
          import os, json, sys
          from datetime import datetime
          tag_name = os.environ.get('TAG_NAME', '')
          # Strip leading 'v' to get raw SemVer for Tauri client
          version_semver = tag_name.lstrip('v')
          
          latest_json = {
              'version': version_semver,
              'notes': f'Tman {tag_name} ',
              'pub_date': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': {
                  'linux-x86_64': {
                      'signature': 'NOT_USED_BECAUSE_NO_AUTO_UPDATE',
                      'url': f'https://github.com/NotWeyn/Tman/releases/tag/{tag_name}'
                  }
              }
          }
          
          with open('latest.json', 'w') as f:
              json.dump(latest_json, f, indent=2)
              
          print('✅ Generated latest.json successfully!')
          "

      - name: Create GitHub Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Tman ${{ github.ref_name }}" \
            --notes "Tman ${{ github.ref_name }} " \
            --draft=false \
            --prerelease=false \
            latest.json

